services:
  postgres:
    image: postgres:15-alpine
    container_name: cost_postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cost_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - cost-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: cost_backend
    restart: always

    working_dir: /app

    ports:
      - "3000:3000"
      - "5555:5555"

    volumes:
      - ./backend:/app
      - /app/node_modules

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cost_db

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - cost-network

    command: >
      sh -c "
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run start:dev
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: cost_frontend
    restart: always

    working_dir: /app

    ports:
      - "3001:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000

    depends_on:
      - backend

    networks:
      - cost-network

volumes:
  postgres_data:

networks:
  cost-network:
    driver: bridge
